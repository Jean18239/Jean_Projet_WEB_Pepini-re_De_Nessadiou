<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <title>Arbres</title>

  <style>
    body {
      font-family: Arial;
      background-color: #f4f8f4;
      margin: 0;
    }

    header {
      background-color: #2e7d32;
      color: white;
      text-align: center;
      padding: 20px;
    }

    .container {
      padding: 30px;
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
    }

    .card {
      background: white;
      border-radius: 10px;
      padding: 15px;
      width: 200px;
      text-align: center;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    .card img {
      width: 100%;
      height: 120px;
      object-fit: cover;
      border-radius: 10px;
    }

    .card a {
      text-decoration: none;
      color: #2e7d32;
      font-weight: bold;
    }

    .card:hover {
      transform: scale(1.05);
      transition: 0.3s;
    }
  </style>
</head>

<body>

  <header>
    <h1>Nos Arbres</h1>
  </header>

  <div class="container">

    <div class="card">
      <img src="santal.webp">
      <a href="santal.html">SANTAL</a>
    </div>

    <div class="card">
      <img src="Bois Noir Caledonien.jpg">
      <a href="Bois Noir Caledonien.html">Bois noir calédonien</a>
    </div>

    <div class="card">
      <img src="Samanea-saman.jpg">
      <a href="Bois Noir Haïti.html">Bois Noir Haïti</a>
    </div>

    <div class="card">
      <img src="baominia.jpg">
      <a href="Baominia.html">Baominia</a>
    </div>

    <div class="card">
      <img src="burao.webp">
      <a href="Burao.html">Burao</a>
    </div>

    <div class="card">
      <img src="Gaïac.jpg">
      <a href="Gaïac.html">Gaïac</a>
    </div>

    <div class="card">
      <img src="Gaïac Grosse Feuille.webp">
      <a href="Gaïacgrossefeuille.html">Gaïac</a>
    </div>

  </div>

</body>

</html>
